name: Keboola Component Build & Deploy Pipeline
on:
  push:
    branches-ignore:
      - main
    tags:
      - "*"

concurrency: ci-${{ github.ref }}

jobs:
  pre-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check version consistency
        run: PYTHONPATH=src uv run python scripts/check_versions.py

  ci:
    name: Build, Test & Deploy
    needs: pre-check
    uses: keboola/component-ci/.github/workflows/component-pipeline.yml@master
    with:
      app_id: keboola.duckdb-transformation
      vendor: keboola
      test_build_target: test
      docker_build_target: production
      test_command: uv run python -m pytest tests/ --tb=short -q
    secrets: inherit
